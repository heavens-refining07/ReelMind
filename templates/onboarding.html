<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReelMind — Pick Your Favourites</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--red:#e63946;--amber:#f4a261;--dark:#0a0a0f;--card:#13131e;--border:#1e1e2e;--text:#f0eff4;--muted:#6b6b80;--green:#52b788;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--dark);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 20% 0%,rgba(230,57,70,0.07) 0%,transparent 60%);pointer-events:none;z-index:0;}

  nav{position:sticky;top:0;z-index:100;background:rgba(10,10,15,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:64px;}
  .nav-brand{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:3px;background:linear-gradient(135deg,var(--red),var(--amber));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .nav-step{font-size:0.8rem;color:var(--muted);}

  .hero{text-align:center;padding:50px 20px 30px;position:relative;z-index:1;}
  .hero-eyebrow{display:inline-block;font-size:0.72rem;letter-spacing:3px;text-transform:uppercase;color:var(--amber);background:rgba(244,162,97,0.08);border:1px solid rgba(244,162,97,0.2);border-radius:100px;padding:5px 16px;margin-bottom:18px;}
  .hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.5rem,6vw,4.5rem);letter-spacing:2px;line-height:1;margin-bottom:12px;}
  .hero-title span{background:linear-gradient(135deg,var(--red),var(--amber));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .hero-sub{font-size:0.95rem;color:var(--muted);max-width:500px;margin:0 auto;}

  /* progress bar */
  .progress-wrap{max-width:500px;margin:24px auto 0;padding:0 20px;}
  .progress-label{display:flex;justify-content:space-between;font-size:0.75rem;color:var(--muted);margin-bottom:8px;}
  .progress-bar{height:4px;background:var(--border);border-radius:100px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(135deg,var(--red),var(--amber));border-radius:100px;transition:width 0.3s ease;width:0%;}

  /* genre filter */
  .genre-filter{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:20px 20px 0;position:relative;z-index:1;}
  .genre-btn{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:100px;padding:6px 16px;font-size:0.78rem;cursor:pointer;transition:all 0.2s;font-family:'Outfit',sans-serif;}
  .genre-btn:hover{border-color:var(--amber);color:var(--amber);}
  .genre-btn.active{background:rgba(230,57,70,0.15);border-color:var(--red);color:var(--red);}

  /* movie grid */
  .movies-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px;max-width:1100px;margin:24px auto 0;padding:0 20px;position:relative;z-index:1;}

  .movie-card{position:relative;border-radius:12px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:all 0.2s;aspect-ratio:2/3;}
  .movie-card img{width:100%;height:100%;object-fit:cover;display:block;background:#1a1a2e;}
  .movie-card .overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.85) 0%,transparent 50%);display:flex;flex-direction:column;justify-content:flex-end;padding:10px;}
  .movie-card .m-title{font-size:0.78rem;font-weight:600;line-height:1.3;color:#fff;}
  .movie-card .m-year{font-size:0.68rem;color:rgba(255,255,255,0.6);}

  .movie-card .check{position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:50%;background:var(--green);display:none;align-items:center;justify-content:center;font-size:0.9rem;box-shadow:0 2px 8px rgba(0,0,0,0.4);}

  .movie-card.selected{border-color:var(--green);}
  .movie-card.selected .check{display:flex;}
  .movie-card.selected .overlay{background:linear-gradient(to top,rgba(82,183,136,0.4) 0%,transparent 60%);}

  /* sticky bottom bar */
  .bottom-bar{position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(10,10,15,0.97);backdrop-filter:blur(12px);border-top:1px solid var(--border);padding:16px 40px;display:flex;align-items:center;justify-content:space-between;}
  .selected-count{font-size:0.9rem;color:var(--muted);}
  .selected-count strong{color:var(--green);font-size:1.1rem;}
  .btn-continue{background:linear-gradient(135deg,var(--red),#c1121f);color:#fff;border:none;border-radius:10px;padding:12px 32px;font-family:'Outfit',sans-serif;font-size:0.95rem;font-weight:600;cursor:pointer;transition:opacity 0.2s,transform 0.1s;opacity:0.4;pointer-events:none;}
  .btn-continue.active{opacity:1;pointer-events:all;}
  .btn-continue.active:hover{opacity:0.88;}
  .btn-skip{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:10px;padding:12px 20px;font-family:'Outfit',sans-serif;font-size:0.85rem;cursor:pointer;transition:all 0.2s;}
  .btn-skip:hover{border-color:var(--muted);}

  .loader-wrap{text-align:center;padding:60px 20px;display:none;}
  .loader-wrap.show{display:block;}
  .spinner{width:40px;height:40px;border:2px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .mb-bar{height:80px;}
  @media(max-width:600px){.bottom-bar{padding:12px 16px;}.movies-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;}}
</style>
</head>
<body>

<nav>
  <div class="nav-brand">ReelMind</div>
  <div class="nav-step">Step 1 of 1 — Tell us your taste</div>
</nav>

<div class="hero">
  <div class="hero-eyebrow">✦ Personalise Your Experience</div>
  <h1 class="hero-title">Pick Movies <span>You've Seen</span></h1>
  <p class="hero-sub">Select at least 3 movies you've watched. We'll use this to curate your home screen!</p>
  <div class="progress-wrap">
    <div class="progress-label"><span id="progressText">0 selected</span><span>Select at least 3</span></div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>
</div>

<!-- Genre filter -->
<div class="genre-filter" id="genreFilter">
  <button class="genre-btn active" onclick="filterGenre(28, this)">Action</button>
  <button class="genre-btn" onclick="filterGenre(35, this)">Comedy</button>
  <button class="genre-btn" onclick="filterGenre(18, this)">Drama</button>
  <button class="genre-btn" onclick="filterGenre(27, this)">Horror</button>
  <button class="genre-btn" onclick="filterGenre(10749, this)">Romance</button>
  <button class="genre-btn" onclick="filterGenre(878, this)">Sci-Fi</button>
  <button class="genre-btn" onclick="filterGenre(53, this)">Thriller</button>
  <button class="genre-btn" onclick="filterGenre(16, this)">Animation</button>
  <button class="genre-btn" onclick="filterGenre(12, this)">Adventure</button>
</div>

<div class="loader-wrap" id="loaderWrap">
  <div class="spinner"></div>
  <p style="color:var(--muted);font-size:0.85rem;">Loading movies…</p>
</div>

<div class="movies-grid" id="moviesGrid"></div>
<div class="mb-bar"></div>

<div class="bottom-bar">
  <div class="selected-count"><strong id="countNum">0</strong> movies selected</div>
  <div style="display:flex;gap:10px;">
    <button class="btn-skip" onclick="skipOnboarding()">Skip for now</button>
    <button class="btn-continue" id="continueBtn" onclick="savePreferences()">Continue →</button>
  </div>
</div>

<script>
  let selectedMovies = [];
  let currentGenre = 28;
  let allMoviesByGenre = {};

  async function loadMovies(genreId) {
    document.getElementById('loaderWrap').classList.add('show');
    document.getElementById('moviesGrid').innerHTML = '';

    if (allMoviesByGenre[genreId]) {
      renderMovies(allMoviesByGenre[genreId]);
      document.getElementById('loaderWrap').classList.remove('show');
      return;
    }

    try {
      const r = await fetch(`/onboarding-movies?genre=${genreId}`);
      const movies = await r.json();
      allMoviesByGenre[genreId] = movies;
      renderMovies(movies);
    } catch(e) {
      document.getElementById('moviesGrid').innerHTML = '<p style="color:var(--muted);text-align:center;grid-column:1/-1;padding:40px">Failed to load movies.</p>';
    }
    document.getElementById('loaderWrap').classList.remove('show');
  }

  function renderMovies(movies) {
    const grid = document.getElementById('moviesGrid');
    grid.innerHTML = '';
    movies.forEach(m => {
      if (!m.poster) return;
      const card = document.createElement('div');
      card.className = 'movie-card' + (selectedMovies.find(s => s.id === m.id) ? ' selected' : '');
      card.dataset.id = m.id;
      card.innerHTML = `
        <img src="${m.poster}" alt="${m.title}" loading="lazy" onerror="this.closest('.movie-card').remove()">
        <div class="overlay">
          <div class="m-title">${m.title}</div>
          <div class="m-year">${m.year}</div>
        </div>
        <div class="check">✓</div>
      `;
      card.onclick = () => toggleMovie(card, m);
      grid.appendChild(card);
    });
  }

  function toggleMovie(card, movie) {
    const idx = selectedMovies.findIndex(m => m.id === movie.id);
    if (idx === -1) {
      selectedMovies.push(movie);
      card.classList.add('selected');
    } else {
      selectedMovies.splice(idx, 1);
      card.classList.remove('selected');
    }
    updateCounter();
  }

  function updateCounter() {
    const count = selectedMovies.length;
    document.getElementById('countNum').textContent = count;
    document.getElementById('progressText').textContent = `${count} selected`;
    const pct = Math.min((count / 3) * 100, 100);
    document.getElementById('progressFill').style.width = pct + '%';
    const btn = document.getElementById('continueBtn');
    if (count >= 3) btn.classList.add('active');
    else btn.classList.remove('active');
  }

  function filterGenre(genreId, btn) {
    currentGenre = genreId;
    document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadMovies(genreId);
  }

  async function savePreferences() {
    if (selectedMovies.length < 3) return;
    const r = await fetch('/save-preferences', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({movies: selectedMovies})
    });
    if (r.ok) window.location = '/';
  }

  function skipOnboarding() {
    fetch('/save-preferences', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({movies: []})
    }).then(() => window.location = '/');
  }

  // Load initial genre
  loadMovies(28);
</script>
</body>
</html>
