<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReelMind — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #e63946;
    --amber: #f4a261;
    --dark: #0a0a0f;
    --card: #12121a;
    --border: #1f1f2e;
    --text: #f0eff4;
    --muted: #6b6b80;
  }
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--dark);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* Left film strip panel */
  .left-panel {
    width: 55%;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .film-bg {
    position: absolute; inset: 0;
    background:
      linear-gradient(135deg, #1a0a0a 0%, #0d0d1a 50%, #0a1a0a 100%);
  }

  .film-strip {
    position: absolute;
    top: 0; bottom: 0;
    width: 60px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 10px 8px;
    opacity: 0.15;
  }
  .film-strip.left { left: 0; }
  .film-strip.right { right: 0; }

  .film-hole {
    width: 44px; height: 32px;
    border: 2px solid #fff;
    border-radius: 4px;
    flex-shrink: 0;
  }

  .movie-grid {
    position: absolute; inset: 60px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    opacity: 0.12;
    transform: rotate(-3deg) scale(1.1);
  }

  .movie-tile {
    background: linear-gradient(135deg, var(--red), var(--amber));
    border-radius: 6px;
    aspect-ratio: 2/3;
  }

  .movie-tile:nth-child(2n) { background: linear-gradient(135deg, #1a1a3a, #2a1a4a); }
  .movie-tile:nth-child(3n) { background: linear-gradient(135deg, #1a2a1a, #0a1a2a); }

  .hero-text {
    position: relative; z-index: 2;
    text-align: center;
    padding: 40px;
  }

  .brand {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 5rem;
    letter-spacing: 4px;
    background: linear-gradient(135deg, var(--red), var(--amber));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin-bottom: 16px;
  }

  .brand-sub {
    font-size: 0.9rem;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 40px;
  }

  .feature-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
    text-align: left;
    max-width: 280px;
    margin: 0 auto;
  }

  .feature-item {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 0.88rem;
    color: #8888a0;
  }

  .feature-icon {
    width: 32px; height: 32px;
    background: rgba(230, 57, 70, 0.1);
    border: 1px solid rgba(230, 57, 70, 0.2);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem; flex-shrink: 0;
  }

  /* Right login panel */
  .right-panel {
    width: 45%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
    border-left: 1px solid var(--border);
  }

  .login-box {
    width: 100%;
    max-width: 380px;
  }

  .login-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    letter-spacing: 2px;
    color: var(--text);
    margin-bottom: 6px;
  }

  .login-sub {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 36px;
  }

  .form-group {
    margin-bottom: 18px;
  }

  label {
    display: block;
    font-size: 0.75rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  input[type="text"], input[type="password"] {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.95rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input:focus {
    border-color: var(--red);
    box-shadow: 0 0 0 3px rgba(230,57,70,0.1);
  }

  input::placeholder { color: #3a3a50; }

  .btn-login {
    width: 100%;
    background: linear-gradient(135deg, var(--red), #c1121f);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 15px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s, transform 0.1s;
  }

  .btn-login:hover { opacity: 0.9; }
  .btn-login:active { transform: scale(0.98); }

  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 24px 0;
  }
  .divider-line { flex: 1; height: 1px; background: var(--border); }
  .divider-text { font-size: 0.75rem; color: var(--muted); }

  .btn-register {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 14px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.9rem;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }

  .btn-register:hover {
    border-color: var(--amber);
    background: rgba(244,162,97,0.05);
    color: var(--amber);
  }

  .error-box {
    display: none;
    background: rgba(230,57,70,0.1);
    border: 1px solid rgba(230,57,70,0.3);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 0.83rem;
    color: var(--red);
    margin-bottom: 16px;
  }
  .error-box.show { display: block; }

  .college-tag {
    margin-top: 40px;
    font-size: 0.72rem;
    color: #3a3a50;
    text-align: center;
    letter-spacing: 0.5px;
  }

  @media (max-width: 768px) {
    .left-panel { display: none; }
    .right-panel { width: 100%; }
  }
</style>
</head>
<body>

<!-- LEFT PANEL -->
<div class="left-panel">
  <div class="film-bg"></div>
  <div class="film-strip left">
    <div class="film-hole"></div><div class="film-hole"></div><div class="film-hole"></div>
    <div class="film-hole"></div><div class="film-hole"></div><div class="film-hole"></div>
    <div class="film-hole"></div><div class="film-hole"></div><div class="film-hole"></div>
    <div class="film-hole"></div><div class="film-hole"></div><div class="film-hole"></div>
    <div class="film-hole"></div><div class="film-hole"></div><div class="film-hole"></div>
  </div>
  <div class="film-strip right">
    <div class="film-hole"></div><div class="film-hole"></div><div class="film-hole"></div>
    <div class="film-hole"></div><div class="film-hole"></div><div class="film-hole"></div>
    <div class="film-hole"></div><div class="film-hole"></div><div class="film-hole"></div>
    <div class="film-hole"></div><div class="film-hole"></div><div class="film-hole"></div>
    <div class="film-hole"></div><div class="film-hole"></div><div class="film-hole"></div>
  </div>
  <div class="movie-grid">
    <div class="movie-tile"></div><div class="movie-tile"></div><div class="movie-tile"></div>
    <div class="movie-tile"></div><div class="movie-tile"></div><div class="movie-tile"></div>
    <div class="movie-tile"></div><div class="movie-tile"></div><div class="movie-tile"></div>
  </div>
  <div class="hero-text">
    <div class="brand">ReelMind</div>
    <div class="brand-sub">Movie Recommendation System</div>
    <div class="feature-list">
      <div class="feature-item">
        <div class="feature-icon">🎯</div>
        AI-powered content-based filtering
      </div>
      <div class="feature-item">
        <div class="feature-icon">🎬</div>
        30+ curated films with real posters
      </div>
      <div class="feature-item">
        <div class="feature-icon">⚡</div>
        Instant similarity matching
      </div>
    </div>
  </div>
</div>

<!-- RIGHT PANEL -->
<div class="right-panel">
  <div class="login-box">
    <div class="login-title">Welcome Back</div>
    <div class="login-sub">Sign in to get your personalized movie picks</div>

    <div class="error-box" id="errorBox"></div>

    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter your username" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password" onkeydown="if(event.key==='Enter') doLogin()" />
    </div>

    <button class="btn-login" onclick="doLogin()">Sign In →</button>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">New here?</div>
      <div class="divider-line"></div>
    </div>

    <button class="btn-register" onclick="window.location='/register'">Create an Account</button>

    <div class="college-tag">
      CS-281-FP Mini Project · S.Y.B.Sc. Computer Science<br>
      Savitribai Phule Pune University
    </div>
  </div>
</div>

<script>
  function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const errorBox = document.getElementById('errorBox');
    errorBox.classList.remove('show');

    if (!username || !password) {
      errorBox.textContent = 'Please fill in both fields.';
      errorBox.classList.add('show'); return;
    }

    fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    })
    .then(r => r.json().then(d => ({ ok: r.ok, data: d })))
    .then(({ ok, data }) => {
      if (ok) window.location = '/';
      else {
        errorBox.textContent = data.error || 'Login failed.';
        errorBox.classList.add('show');
      }
    });
  }
</script>
</body>
</html>
